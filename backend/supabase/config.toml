# Minimal Supabase local config. Set project_id to your linked project ref before deploy.
project_id = "pulso"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
# PostGIS lives in the extensions schema; expose it on the search path for RPCs.
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true

[realtime]
enabled = true

[functions.verify-identity]
verify_jwt = true

[functions.analyze-report]
verify_jwt = true

[functions.create-realtime-session]
verify_jwt = true

[functions.agent-tools]
verify_jwt = true

# proximity-dispatcher is also invoked by a DB trigger/webhook, not only a user JWT.
[functions.proximity-dispatcher]
verify_jwt = false
